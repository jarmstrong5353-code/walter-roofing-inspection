<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2D5016">
<title>Walter Roofing — Inspection</title>
<style>
:root{--g:#2D5016;--gd:#1e3a0e;--gl:#EAF2E3;--gm:#C5DFB0;--gb:#3a6b1e;--am:#FFF3CD;--ab:#856404;--rl:#FDECEA;--rd:#C0392B;--bl:#EBF3FB;--bdr:#D9D9D9;--gray:#F5F5F5;--tx:#2c2c2c;--txm:#666;--wh:#fff;--r:8px;--storm:#1565C0;--storml:#E3F2FD;--retail:#5D4037;--retaill:#EFEBE9}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--tx);background:#ccc;min-height:100vh}
.app{max-width:600px;margin:0 auto;background:var(--wh);min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--g);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.hdr-info{flex:1}.hdr-title{font-size:15px;font-weight:600}.hdr-sub{font-size:11px;opacity:.75;margin-top:1px}
.hdr-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;flex-shrink:0}
.prog-wrap{background:var(--gd);height:3px;flex-shrink:0}.prog-bar{height:3px;background:var(--gm);transition:width .3s}
.snav{display:flex;overflow-x:auto;background:#f9f9f9;border-bottom:1px solid var(--bdr);scrollbar-width:none;padding:0 12px;flex-shrink:0}
.snav::-webkit-scrollbar{display:none}
.sp{flex-shrink:0;padding:9px 12px;font-size:11px;font-weight:500;color:var(--txm);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.sp.active{color:var(--g);border-bottom-color:var(--g);font-weight:700}.sp.done{color:var(--g)}.sp.done::before{content:'✓ '}
.main{flex:1;overflow-y:auto;padding:16px 16px 90px}
.bnav{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--wh);flex-shrink:0}
.btn{flex:1;padding:12px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}.btn:active{transform:scale(.98)}
.btnp{background:var(--g);color:#fff}.btnp:hover{background:var(--gb)}
.btns{background:var(--gray);color:var(--tx);border:1.5px solid var(--bdr);flex:0;padding:12px 14px;font-size:13px}
.btng{background:var(--gd);color:#fff}
.stitle{font-size:18px;font-weight:700;color:var(--g);margin-bottom:3px}
.ssub{font-size:12px;color:var(--txm);margin-bottom:14px;line-height:1.5}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--tx);background:var(--wh);-webkit-appearance:none;font-family:inherit;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--g)}
.field textarea{resize:vertical;min-height:65px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.blabel{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:7px;margin-top:2px}
.dv{height:1px;background:var(--bdr);margin:14px 0}
.icard{background:var(--bl);border:1px solid #b3d4f0;border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:#1a4a7a;line-height:1.5}
.wcard{background:var(--am);border:1px solid #d4a017;border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:#5c3d00;line-height:1.5}
.lcard{background:var(--rl);border:1px solid var(--rd);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:#7a1a1a;line-height:1.5}
.gcard{background:var(--gl);border:1px solid var(--gm);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:#1a3a0a;line-height:1.5}
.pz{border:2px dashed var(--bdr);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;background:var(--gray);position:relative;transition:all .2s}
.pz:hover{border-color:var(--g);background:var(--gl)}
.pz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pz-txt{font-size:12px;color:var(--txm)}.pz-hint{font-size:11px;color:var(--txm);margin-top:2px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.pthumb{position:relative;border-radius:5px;overflow:hidden;border:1px solid var(--bdr)}
.pthumb img{width:100%;height:95px;object-fit:cover;display:block}
.pthumb .rmb{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pthumb .pcnt{font-size:10px;color:var(--txm);text-align:center;padding:2px 4px;background:var(--gray);border-top:1px solid var(--bdr)}
.dchecks{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.chi{display:flex;align-items:center;gap:7px;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .2s;user-select:none}
.chi:hover,.chi.on{border-color:var(--g);background:var(--gl)}
.chb{width:16px;height:16px;border:2px solid var(--bdr);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chi.on .chb{background:var(--g);border-color:var(--g)}.chm{color:#fff;font-size:10px;display:none}.chi.on .chm{display:block}
.chl{font-size:12px;color:var(--tx);line-height:1.3}
.ctr-wrap{display:flex;align-items:center;border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.ctr-btn{width:48px;height:48px;border:none;background:var(--gray);font-size:20px;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}.ctr-btn:active{background:var(--gm)}
.ctr-tap{flex:1;height:48px;border:none;background:var(--g);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}.ctr-tap:active{background:var(--gd)}
.ctr-in{width:62px;height:48px;border:none;border-left:1.5px solid var(--bdr);text-align:center;font-size:20px;font-weight:700;color:var(--g);background:#fff;font-family:inherit}.ctr-in:focus{outline:none;background:var(--gl)}
.thnote{font-size:11px;color:var(--txm);margin-top:5px}.thnote.pass{color:#2e7d32;font-weight:700}.thnote.warn{color:var(--ab);font-weight:600}
.comp-table{width:100%;border-collapse:collapse;margin-bottom:4px}
.comp-table td{padding:7px 8px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
.comp-table td:first-child{font-weight:500}.comp-table td:last-child{width:90px}
.comp-table input{width:76px;border:1.5px solid var(--bdr);border-radius:5px;padding:6px 8px;font-size:14px;font-weight:600;color:var(--g);text-align:center;font-family:inherit;background:var(--wh)}
.comp-table input:focus{outline:none;border-color:var(--g);background:var(--gl)}
/* FINDINGS */
.finding-card{border:1px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:10px;background:#fff}
.fc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.fc-num{width:22px;height:22px;background:var(--g);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.fc-del{background:none;border:none;color:var(--rd);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.action-row{display:flex;gap:6px;margin-bottom:8px}
.act-btn{flex:1;padding:8px 4px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;text-align:center;background:var(--wh);font-family:inherit;transition:all .2s;text-transform:uppercase;letter-spacing:.3px}
.act-repair{background:var(--am)!important;border-color:var(--ab)!important;color:var(--ab)!important}
.act-replace{background:var(--rl)!important;border-color:var(--rd)!important;color:var(--rd)!important}
.act-monitor{background:var(--bl)!important;border-color:#2E75B6!important;color:#2E75B6!important}
.add-finding-btn{width:100%;padding:11px;border:2px dashed var(--gm);border-radius:var(--r);background:var(--gl);color:var(--g);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:all .2s}
.add-finding-btn:hover{background:var(--gm)}
/* HOME */
.home-hero{background:var(--g);padding:26px 20px 22px;text-align:center;color:#fff}
.home-hero h1{font-size:21px;font-weight:700;margin-bottom:3px}
.home-hero p{font-size:12px;color:var(--gm)}
.home-content{padding:18px 16px}
.home-new-btn{display:block;width:100%;padding:15px;background:var(--g);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:18px;transition:background .2s}
.home-new-btn:hover{background:var(--gb)}
.saved-hdr{font-size:12px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.saved-card{border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;background:var(--wh)}
.saved-card:hover{border-color:var(--g);background:var(--gl)}
.type-badge{flex-shrink:0;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-storm{background:var(--storml);color:var(--storm);border:1px solid #90CAF9}
.badge-retail{background:var(--retaill);color:var(--retail);border:1px solid #BCAAA4}
.saved-info{flex:1}.saved-addr{font-size:13px;font-weight:600;color:var(--tx)}.saved-meta{font-size:11px;color:var(--txm);margin-top:1px}
.saved-del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:4px;transition:color .2s;flex-shrink:0}.saved-del:hover{color:var(--rd)}
.empty-state{text-align:center;padding:28px 20px;color:var(--txm)}
/* TYPE PICKER */
.type-picker{padding:22px 16px}
.type-picker h2{font-size:17px;font-weight:700;color:var(--g);margin-bottom:5px}
.type-picker p{font-size:12px;color:var(--txm);margin-bottom:20px;line-height:1.5}
.type-card{border:2px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all .2s;background:var(--wh);text-align:left;width:100%;font-family:inherit}
.type-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.tc-storm{border-color:#90CAF9}.tc-storm:hover{border-color:var(--storm);background:var(--storml)}
.tc-retail{border-color:#BCAAA4}.tc-retail:hover{border-color:var(--retail);background:var(--retaill)}
.tc-icon{font-size:26px;margin-bottom:7px}.tc-title{font-size:15px;font-weight:700;margin-bottom:3px}
.tc-storm .tc-title{color:var(--storm)}.tc-retail .tc-title{color:var(--retail)}
.tc-desc{font-size:12px;color:var(--txm);line-height:1.5}
.tc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tc-tag{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600}
.tc-storm .tc-tag{background:var(--storml);color:var(--storm)}.tc-retail .tc-tag{background:var(--retaill);color:var(--retail)}
/* REVIEW */
.rcard{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.rch{background:var(--g);color:#fff;padding:8px 14px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.rcb{padding:8px 14px;font-size:12px}
.rrow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0}.rrow:last-child{border:none}
.rl2{color:var(--txm)}.rv2{font-weight:600;text-align:right;max-width:60%}
.sib{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.sipass{background:var(--gl);color:var(--g);border:1px solid var(--gm)}.siwarn{background:var(--am);color:var(--ab);border:1px solid #d4a017}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">WR</div>
    <div class="hdr-info"><div class="hdr-title">Walter Roofing</div><div class="hdr-sub" id="hdr-sub">Inspection App</div></div>
    <div class="hdr-badge" id="hdr-badge" style="display:none"></div>
  </div>
  <div class="prog-wrap" id="pw" style="display:none"><div class="prog-bar" id="prog"></div></div>
  <div class="snav" id="snav" style="display:none"></div>
  <div class="main" id="mc"></div>
  <div class="bnav" id="bnav" style="display:none">
    <button class="btn btns" id="bb" onclick="go(-1)">← Back</button>
    <button class="btn btnp" id="nb" onclick="go(1)">Next →</button>
  </div>
</div>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const SURFS=[{id:'siding',l:'Siding'},{id:'winsill',l:'Window sills'},{id:'screens',l:'Window screens'},{id:'shutters',l:'Shutters'},{id:'gutters',l:'Gutters/downspouts'},{id:'fascia',l:'Fascia/soffit'},{id:'garage',l:'Garage door'},{id:'wood',l:'Painted wood'},{id:'masonry',l:'Brick/masonry'},{id:'ac',l:'A/C condenser'}];
const COMPS=[{id:'ventStack',l:'Vent Stacks'},{id:'pipeBoots',l:'Pipe Boots'},{id:'boxVents',l:'Box Vents'},{id:'powerVents',l:'Power Vents'},{id:'bathVents',l:'Bathroom Vents'},{id:'turbines',l:'Turbine Vents'},{id:'skylights',l:'Skylights'},{id:'chimney',l:'Chimney'},{id:'valleyMetal',l:'Valley Metal'},{id:'elecPipeBoot',l:'Electrical Pipe Boots'}];
const ELEVS=['front','right','rear','left'];
const SLOPES=['front','right','rear','left'];
const EL={front:'Front',right:'Right',rear:'Rear',left:'Left'};
const ED={front:'Primary exposure',right:'Right side',rear:'Rear elevation',left:'Left side'};
const ACTIONS=['Repair','Replace','Monitor'];
const STORM_STEPS=['Job Setup','Front','Right','Rear','Left','Roof','Slopes','Review'];
const RETAIL_STEPS=['Job Setup','Front','Right','Rear','Left','Roof','Review'];

// ── STATE ──────────────────────────────────────────────────────────────────────
let VIEW='home', cur=0, S={};

function freshStorm(){
  return{type:'storm',id:Date.now()+'',
    job:{owner:'',address:'',city:'',zip:'',stormDate:'',inspDate:'',hailSize:'',repName:'',repPhone:'',notes:''},
    elev:{front:{ov:[],cu:[],surfaces:[],notes:''},right:{ov:[],cu:[],surfaces:[],notes:''},rear:{ov:[],cu:[],surfaces:[],notes:''},left:{ov:[],cu:[],surfaces:[],notes:''}},
    roof:{pitch:'',gsize:'',glf:'',gdmg:false,ggdmg:false,dedmg:false,ovPhotos:[],accPhotos:[],comps:Object.fromEntries(COMPS.map(c=>[c.id,''])),notes:''},
    slopes:{front:{ov:[],nt:[],ip:[],cnt:0,notes:''},right:{ov:[],nt:[],ip:[],cnt:0,notes:''},rear:{ov:[],nt:[],ip:[],cnt:0,notes:''},left:{ov:[],nt:[],ip:[],cnt:0,notes:''}}};
}
function freshRetail(){
  return{type:'retail',id:Date.now()+'',
    job:{owner:'',address:'',city:'',zip:'',inspDate:'',repName:'',repPhone:'',notes:''},
    elev:{front:{ov:[],cu:[],findings:[],notes:''},right:{ov:[],cu:[],findings:[],notes:''},rear:{ov:[],cu:[],findings:[],notes:''},left:{ov:[],cu:[],findings:[],notes:''}},
    roof:{pitch:'',gsize:'',glf:'',ovPhotos:[],accPhotos:[],comps:Object.fromEntries(COMPS.map(c=>[c.id,''])),findings:[],notes:''}};
}
function freshFinding(){return{id:Date.now()+'',area:'',action:'',description:'',crewNote:'',material:'',photos:[]};}

// ── STORAGE ────────────────────────────────────────────────────────────────────
function loadAll(){try{return JSON.parse(localStorage.getItem('wr_insp')||'{}');}catch(e){return{};}}
function saveInsp(){if(VIEW!=='inspection')return;try{const a=loadAll();a[S.id]=S;localStorage.setItem('wr_insp',JSON.stringify(a));}catch(e){}}
function deleteInsp(id){try{const a=loadAll();delete a[id];localStorage.setItem('wr_insp',JSON.stringify(a));}catch(e){}}
function autoSave(){saveInsp();}

// ── PHOTOS ─────────────────────────────────────────────────────────────────────
function readFile(f){
  return new Promise(r=>{
    const fr=new FileReader();
    fr.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1200;
        let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        else if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        r(c.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    fr.readAsDataURL(f);
  });
}
function getArr(gid){
  if(gid.startsWith('g-e-')){const p=gid.split('-');return S.elev[p[2]][p[3]==='ov'?'ov':'cu'];}
  if(gid==='g-roof-ov')return S.roof.ovPhotos;
  if(gid==='g-roof-acc')return S.roof.accPhotos;
  if(gid.startsWith('g-sl-')){const p=gid.split('-');return S.slopes[p[2]][p[3]==='ov'?'ov':p[3]==='nt'?'nt':'ip'];}
  if(gid.startsWith('g-fc-')){const p=gid.split('-');return p[2]==='roof'?S.roof.findings[+p[3]].photos:S.elev[p[2]].findings[+p[3]].photos;}
  return null;
}
async function addPhotos(gid,files){
  const arr=getArr(gid);if(!arr)return;
  for(const f of Array.from(files)){if(!f.type.startsWith('image/'))continue;const url=await readFile(f);arr.push({url,name:f.name});}
  renderGrid(gid,arr);autoSave();
}
function renderGrid(gid,arr){
  const g=document.getElementById(gid);if(!g||!arr)return;
  g.innerHTML=arr.map((p,i)=>`<div class="pthumb"><img src="${p.url}" loading="lazy"><button class="rmb" onclick="rmPhoto('${gid}',${i})">✕</button><div class="pcnt">${i+1}/${arr.length}</div></div>`).join('');
}
function rmPhoto(gid,idx){const arr=getArr(gid);if(arr){arr.splice(idx,1);renderGrid(gid,arr);autoSave();}}
function reRenderGrids(){
  setTimeout(()=>{
    ELEVS.forEach(e=>{renderGrid(`g-e-${e}-ov`,S.elev[e].ov);renderGrid(`g-e-${e}-cu`,S.elev[e].cu);(S.elev[e].findings||[]).forEach((_,i)=>renderGrid(`g-fc-${e}-${i}`,S.elev[e].findings[i].photos));});
    renderGrid('g-roof-ov',S.roof.ovPhotos);renderGrid('g-roof-acc',S.roof.accPhotos);
    if(S.type==='storm')SLOPES.forEach(k=>{renderGrid(`g-sl-${k}-ov`,S.slopes[k].ov);renderGrid(`g-sl-${k}-nt`,S.slopes[k].nt);renderGrid(`g-sl-${k}-ip`,S.slopes[k].ip);});
    else(S.roof.findings||[]).forEach((_,i)=>renderGrid(`g-fc-roof-${i}`,S.roof.findings[i].photos));
  },0);
}

// ── STORM HELPERS ──────────────────────────────────────────────────────────────
function toggleSurf(e,id,el){const arr=S.elev[e].surfaces;const i=arr.indexOf(id);i>-1?arr.splice(i,1):arr.push(id);el.classList.toggle('on');el.querySelector('.chm').style.display=arr.includes(id)?'block':'none';autoSave();}
function toggleRC(f,el){S.roof[f]=!S.roof[f];el.classList.toggle('on');el.querySelector('.chm').style.display=S.roof[f]?'block':'none';autoSave();}
function adj(k,d){S.slopes[k].cnt=Math.max(0,S.slopes[k].cnt+d);const inp=document.getElementById('ci-'+k);if(inp)inp.value=S.slopes[k].cnt;updNote(k);autoSave();}
function updNote(k){
  const n=document.getElementById('cn-'+k);if(!n)return;
  const c=S.slopes[k].cnt;n.className='thnote';
  if(c>=8){n.classList.add('pass');n.textContent=`✓ ${c} impacts — functional threshold confirmed`;}
  else if(c>0){n.classList.add('warn');n.textContent=`${c} documented — need ${8-c} more`;}
  else n.textContent='Tap or enter count to document impacts';
}

// ── RETAIL HELPERS ─────────────────────────────────────────────────────────────
function addFinding(t){const f=freshFinding();if(t==='roof')S.roof.findings.push(f);else S.elev[t].findings.push(f);autoSave();renderStep(cur);}
function removeFinding(t,i){if(t==='roof')S.roof.findings.splice(i,1);else S.elev[t].findings.splice(i,1);autoSave();renderStep(cur);}
function setAction(t,i,v,btn){
  const f=t==='roof'?S.roof.findings[i]:S.elev[t].findings[i];
  f.action=v;

  autoSave();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function countPhotos(){
  let t=0;
  ELEVS.forEach(e=>{t+=S.elev[e].ov.length+S.elev[e].cu.length;});
  t+=(S.roof.ovPhotos||[]).length+(S.roof.accPhotos||[]).length;
  if(S.type==='storm')SLOPES.forEach(s=>t+=S.slopes[s].ov.length+S.slopes[s].nt.length+S.slopes[s].ip.length);
  else{ELEVS.forEach(e=>(S.elev[e].findings||[]).forEach(f=>t+=f.photos.length));(S.roof.findings||[]).forEach(f=>t+=f.photos.length);}
  return t;
}

function startInsp(type){S=type==='storm'?freshStorm():freshRetail();cur=0;showInspection();}
function loadInsp(id){
  const a=loadAll();if(!a[id])return;
  S=a[id];
  if(!S.roof.findings)S.roof.findings=[];
  ELEVS.forEach(e=>{if(!S.elev[e].findings)S.elev[e].findings=[];});
  cur=0;showInspection();
}

function showInspection(){
  VIEW='inspection';
  show('pw');show('bnav','flex');show('hdr-badge');
  const labels=S.type==='storm'?STORM_STEPS:RETAIL_STEPS;
  document.getElementById('snav').style.display='flex';
  document.getElementById('snav').innerHTML=labels.map((l,i)=>`<div class="sp" data-s="${i}" onclick="cur=${i};renderStep(cur)">${l}</div>`).join('');
  renderStep(cur);
}

// ── NAV ────────────────────────────────────────────────────────────────────────
function updHdr(s){
  const labels=S.type==='storm'?STORM_STEPS:RETAIL_STEPS;
  document.getElementById('hdr-sub').textContent=labels[s]||'Inspection';
  document.getElementById('hdr-badge').textContent=`${s+1}/${labels.length}`;
  document.getElementById('prog').style.width=`${((s+1)/labels.length)*100}%`;
}
function updNav(s){
  document.querySelectorAll('.sp').forEach(p=>{const ps=+p.dataset.s;p.classList.remove('active','done');if(ps===s)p.classList.add('active');else if(ps<s)p.classList.add('done');});
  document.querySelector(`.sp[data-s="${s}"]`)?.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function updBtns(s){
  const total=(S.type==='storm'?STORM_STEPS:RETAIL_STEPS).length;
  document.getElementById('bb').style.display=s===0?'none':'';
  const nb=document.getElementById('nb');
  if(s===total-1)nb.style.display='none';
  else{nb.style.display='';nb.textContent=s===total-2?'Review →':'Next →';}
}
function go(d){
  const total=(S.type==='storm'?STORM_STEPS:RETAIL_STEPS).length;
  const ns=cur+d;
  if(ns>=0&&ns<total){cur=ns;renderStep(cur);}
  else if(d===-1&&cur===0)showHome();
}

// ── RENDER ROUTER ──────────────────────────────────────────────────────────────
function renderStep(s){
  const mc=document.getElementById('mc');mc.innerHTML='';mc.scrollTop=0;
  if(S.type==='storm'){
    if(s===0)mc.innerHTML=rJobStorm();
    else if(s>=1&&s<=4)mc.innerHTML=rElevStorm(ELEVS[s-1]);
    else if(s===5)mc.innerHTML=rRoofStorm();
    else if(s===6)mc.innerHTML=rSlopes();
    else mc.innerHTML=rReviewStorm();
  } else {
    if(s===0)mc.innerHTML=rJobRetail();
    else if(s>=1&&s<=4)mc.innerHTML=rElevRetail(ELEVS[s-1]);
    else if(s===5)mc.innerHTML=rRoofRetail();
    else mc.innerHTML=rReviewRetail();
  }
  updHdr(s);updNav(s);updBtns(s);
  if(S.type==='storm')SLOPES.forEach(k=>updNote(k));
  reRenderGrids();autoSave();
}

// Shared photo index built same order as export — used for matching
function buildPhotoIndex(){
  const index=[];
  function add(arr,section,target,field){
    (arr||[]).forEach((_,i)=>index.push({section,target,field,idx:i}));
  }
  if(S.type==='storm'){
    ELEVS.forEach(e=>{add(S.elev[e].ov,`${EL[e]} Elevation — Overview`,'elev_'+e,'ov');add(S.elev[e].cu,`${EL[e]} Elevation — Close-Up`,'elev_'+e,'cu');});
    add(S.roof.ovPhotos,'Roof — Overview','roof','ovPhotos');
    add(S.roof.accPhotos,'Roof — Accessories','roof','accPhotos');
    SLOPES.forEach(k=>{add(S.slopes[k].ov,`${EL[k]} Slope — Overview`,'slope_'+k,'ov');add(S.slopes[k].nt,`${EL[k]} Slope — Notation`,'slope_'+k,'nt');add(S.slopes[k].ip,`${EL[k]} Slope — Impacts`,'slope_'+k,'ip');});
  } else {
    ELEVS.forEach(e=>{
      add(S.elev[e].ov,`${EL[e]} Elevation — Overview`,'elev_'+e,'ov');
      add(S.elev[e].cu,`${EL[e]} Elevation — Close-Up`,'elev_'+e,'cu');
      (S.elev[e].findings||[]).forEach((f,fi)=>add(f.photos,`${EL[e]} Finding ${fi+1}`,'finding_'+e+'_'+fi,'photos'));
    });
    add(S.roof.ovPhotos,'Roof — Overview','roof','ovPhotos');
    add(S.roof.accPhotos,'Roof — Accessories','roof','accPhotos');
    (S.roof.findings||[]).forEach((f,fi)=>add(f.photos,`Roof Finding ${fi+1}`,'finding_roof_'+fi,'photos'));
  }
  return index;
}

function getPhotoArr(target,field){
  if(target.startsWith('elev_')){const e=target.replace('elev_','');return S.elev[e][field];}
  if(target.startsWith('slope_')){const k=target.replace('slope_','');return S.slopes[k][field];}
  if(target==='roof')return S.roof[field];
  if(target.startsWith('finding_')){
    const parts=target.split('_');
    if(parts[1]==='roof')return S.roof.findings[+parts[2]].photos;
    return S.elev[parts[1]].findings[+parts[2]].photos;
  }
  return null;
}

function importCaptions(){
  const raw=document.getElementById('caption-paste')?.value?.trim();
  if(!raw){alert('Paste Claude\'s numbered caption list first.');return;}

  // Parse "1. Caption text" or "1: Caption text" format
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const parsed={};
  lines.forEach(line=>{
    const m=line.match(/^(\d+)[.:\)]\s*(.+)/);
    if(m)parsed[parseInt(m[1])]=m[2].trim();
  });

  const index=buildPhotoIndex();
  let matched=0;
  index.forEach((item,i)=>{
    const cap=parsed[i+1];
    if(!cap)return;
    const arr=getPhotoArr(item.target,item.field);
    if(arr&&arr[item.idx]){arr[item.idx].caption=cap;matched++;}
  });

  autoSave();
  const result=document.getElementById('caption-match-result');
  if(result){
    if(matched>0){
      result.style.color='#2D5016';result.style.fontWeight='600';
      result.textContent=`✓ ${matched} caption${matched!==1?'s':''} matched to photos — generate your report now.`;
    } else {
      result.style.color='var(--rd)';result.style.fontWeight='600';
      result.textContent='No captions matched. Make sure you paste Claude\'s numbered list (1. Caption... 2. Caption...)';
    }
  }
}

    const sl=S.slopes[s];const pass=sl.cnt>=8;
    const all=[...sl.ov,...sl.nt,...sl.ip];
    return`<div style="background:#3a6b1e;color:#fff;padding:9px 36px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:700">${EL[s]} Slope</span>
      <span style="background:${pass?LG:'#FFF3CD'};color:${pass?G:'#856404'};border:1px solid ${pass?MG:'#d4a017'};border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700">${sl.cnt} impacts${pass?' — confirmed':''}</span>
    </div>
<div style="padding:12px 36px">
  ${pgRpt(all,all.length===1?1:2,G,MG)}
  ${sl.notes?`<div style="font-size:12px;color:#555;font-style:italic;padding:7px 10px;background:#f9f9f9;border-left:3px solid ${MG};margin-top:8px">${sl.notes}</div>`:''}
</div>`;
  }).join('');

  const compRows=COMPS.filter(c=>S.roof.comps[c.id]).map(c=>`<tr><td>${c.l}</td><td style="text-align:center;font-weight:700">${S.roof.comps[c.id]}</td></tr>`).join('');
  const impactRows=SLOPES.map(s=>{const c=S.slopes[s].cnt;const pass=c>=8;return`<tr><td><strong>${EL[s]}</strong></td><td style="text-align:center;font-weight:700">${c}</td><td style="text-align:center">8 min.</td><td style="text-align:center"><span style="background:${pass?LG:'#FFF3CD'};color:${pass?G:'#856404'};border:1px solid ${pass?MG:'#d4a017'};border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700">${pass?'CONFIRMED':'BELOW THRESHOLD'}</span></td></tr>`;}).join('');

  const sumItems=[
    `${tp} total photos collected on ${j.inspDate||'[date]'} — upload to Claude.ai to add AI captions`,
    ...SLOPES.filter(s=>S.slopes[s].cnt>=8).map(s=>`${EL[s]} slope: ${S.slopes[s].cnt} impacts — functional hail exposure confirmed`),
    ...ELEVS.filter(e=>S.elev[e].surfaces.length).map(e=>`${EL[e]} elevation: ${S.elev[e].surfaces.map(id=>SURFS.find(s=>s.id===id)?.l||id).join(', ')}`),
    S.roof.pitch?`Roof pitch: ${S.roof.pitch}`:'',
    ...COMPS.filter(c=>S.roof.comps[c.id]).map(c=>`${c.l}: ${S.roof.comps[c.id]}`),
    'Full photo archive available for adjuster or carrier review upon request',
    'This report is a contractor inspection document. Walter Roofing does not represent the homeowner in insurance claim proceedings.',
  ].filter(Boolean);

  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Walter Roofing — Storm Inspection — ${j.owner||''}</title><style>${css}</style></head><body><div class="page">
${rptHeader(j,G,LG,MG,'Storm Inspection Photo Report',[['Storm Event Date',j.stormDate||'—'],['Hail Recon Size',j.hailSize?j.hailSize+'"':'—'],['Total Photos',String(tp)],['Claim #','Provided by homeowner']])}
<div style="text-align:center;padding:16px 36px 12px;border-bottom:2px solid ${MG};margin-top:14px">
  <div style="font-size:22px;font-weight:700;color:${G}">STORM INSPECTION PHOTO REPORT</div>
  <div style="font-size:11px;color:#888;font-style:italic;margin-top:4px">Property Condition Documentation | Exhibit B — Walter Roofing Evidence Package</div>
</div>
${phdr('1','ELEVATIONS','Ground-level overviews and close-up condition photos — Front · Right · Rear · Left',G,MG)}
${elevSecs}
${phdr('2','ROOF OVERVIEW & ACCESSORIES','Pitch · Gutters · Component inventory · Penetrations',G,MG)}
${shdr('Roof System Overview','',G)}
<div style="padding:12px 36px">
  <div style="font-size:12px;margin-bottom:10px"><strong>Pitch:</strong> ${S.roof.pitch||'—'} &nbsp;&nbsp;<strong>Gutter Size:</strong> ${S.roof.gsize||'—'} &nbsp;&nbsp;<strong>Lineal Feet:</strong> ${S.roof.glf||'—'}
    ${S.roof.gdmg?` &nbsp;<span style="background:${LG};color:${G};border:1px solid ${MG};border-radius:3px;padding:1px 7px;font-size:11px;font-weight:700">Gutters documented</span>`:''}
    ${S.roof.ggdmg?` &nbsp;<span style="background:${LG};color:${G};border:1px solid ${MG};border-radius:3px;padding:1px 7px;font-size:11px;font-weight:700">Guards documented</span>`:''}
    ${S.roof.dedmg?` &nbsp;<span style="background:${LG};color:${G};border:1px solid ${MG};border-radius:3px;padding:1px 7px;font-size:11px;font-weight:700">Drip edge documented</span>`:''}
  </div>
  ${pgRpt(S.roof.ovPhotos,2,G,MG)}
</div>
${shdr('Components & Penetrations','',G)}
<div style="padding:12px 36px">
  ${compRows?`<table style="margin-bottom:12px"><thead><tr><th>Component</th><th style="text-align:center;width:120px">Count</th></tr></thead><tbody>${compRows}</tbody></table>`:''}
  ${pgRpt(S.roof.accPhotos,3,G,MG)}
  ${S.roof.notes?`<div style="font-size:12px;color:#555;font-style:italic;padding:7px 10px;background:#f9f9f9;border-left:3px solid ${MG};margin-top:8px">${S.roof.notes}</div>`:''}
</div>
${phdr('3','ROOF SLOPES & TEST SQUARES','Impact counts · Field notations · Condition photos — Front · Right · Rear · Left',G,MG)}
<div style="padding:14px 36px"><table><thead><tr><th>Slope</th><th>Impacts</th><th>Threshold</th><th>Assessment</th></tr></thead><tbody>${impactRows}</tbody></table></div>
${slopeSecs}
<div class="sum"><h3>Summary — ${j.address||'[Address]'}</h3><ul>${sumItems.map(l=>`<li>${l}</li>`).join('')}</ul></div>
<div class="ftr"><span>Walter Roofing | Clive, IA | walterroofing.com</span><span>Rep: ${j.repName||''} | ${j.inspDate||''}</span><span>Storm Inspection Photo Report</span></div>
</div></body></html>`;
  dnld(html,`WR_Storm_${(j.address||'report').replace(/[^a-zA-Z0-9]/g,'_').substring(0,22)}_${j.inspDate||'draft'}.html`);
}

function retailSummaryPage(j,allFindings,G,LG,MG,RET,RETL,actBadge,findSec){
  // All findings grouped by location — Front, Right, Rear, Left, Roof
  const LOCS = [
    {key:'Front Elevation', label:'Front Elevation'},
    {key:'Right Elevation', label:'Right Elevation'},
    {key:'Rear Elevation',  label:'Rear Elevation'},
    {key:'Left Elevation',  label:'Left Elevation'},
    {key:'Roof',            label:'Roof'},
  ];

  // Only include locations that have at least one finding
  const locGroups = LOCS.map(loc=>{
    const findings = allFindings.filter(f=>f.loc===loc.key);
    return {...loc, findings};
  }).filter(g=>g.findings.length);

  if(!locGroups.length) return '';

  function actionColor(a){
    return a==='Replace'?'#C0392B':a==='Repair'?'#856404':a==='Monitor'?'#1565C0':'#555';
  }
  function actionBg(a){
    return a==='Replace'?'#FDECEA':a==='Repair'?'#FFF3CD':a==='Monitor'?'#E3F2FD':'#f5f5f5';
  }

  function sumFinding(f,i){
    const hasPhotos = f.photos && f.photos.length;
    return `<div style="border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:14px;page-break-inside:avoid">
      <div style="background:${actionBg(f.action)};padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #ddd">
        <div style="width:24px;height:24px;background:${G};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:${G}">${f.area||'[Surface/Area]'}</div>
        </div>
        <span style="background:${actionBg(f.action)};color:${actionColor(f.action)};border:1px solid ${actionColor(f.action)};border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700">${f.action||'—'}</span>
      </div>
      <div style="padding:10px 14px;background:#fff">
        ${f.description?`<div style="font-size:12px;color:#333;margin-bottom:${f.crewNote||f.material?'8px':'0'};line-height:1.6">${f.description}</div>`:''}
        ${f.crewNote?`<div style="font-size:12px;padding:7px 10px;background:#FFF3CD;border-radius:4px;border-left:3px solid #d4a017;margin-bottom:8px"><strong>Crew Note:</strong> ${f.crewNote}</div>`:''}
        ${f.material?`<div style="font-size:12px;padding:7px 10px;background:#EBF3FB;border-radius:4px;border-left:3px solid #90CAF9;margin-bottom:8px"><strong>Material:</strong> ${f.material}</div>`:''}
        ${hasPhotos?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px">${f.photos.map((p,pi)=>`<div style="border:1px solid #ddd;border-radius:4px;overflow:hidden"><img src="${p.url}" style="width:100%;display:block;max-height:150px;object-fit:contain;background:#f5f5f5"><div style="font-size:10px;color:#888;padding:3px 5px;background:#f9f9f9;text-align:center">${p.caption||'Photo '+(pi+1)}</div></div>`).join('')}</div>`:''}
      </div>
    </div>`;
  }

  const locationSections = locGroups.map(group=>{
    const repCount   = group.findings.filter(f=>f.action==='Replace').length;
    const repairCount= group.findings.filter(f=>f.action==='Repair').length;
    const monCount   = group.findings.filter(f=>f.action==='Monitor').length;
    const badges = [
      repCount   ? `<span style="background:#FDECEA;color:#C0392B;border:1px solid #C0392B;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:6px">${repCount} Replace</span>` : '',
      repairCount? `<span style="background:#FFF3CD;color:#856404;border:1px solid #d4a017;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:6px">${repairCount} Repair</span>` : '',
      monCount   ? `<span style="background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:700;margin-left:6px">${monCount} Monitor</span>` : '',
    ].join('');
    return `
      <div style="margin-bottom:24px">
        <div style="background:#3a6b1e;color:#fff;padding:9px 16px;border-radius:4px;display:flex;align-items:center;margin-bottom:12px">
          <span style="font-size:13px;font-weight:700;flex:1">${group.label}</span>
          ${badges}
        </div>
        ${group.findings.map((f,i)=>sumFinding(f,i)).join('')}
      </div>`;
  }).join('');

  // Closing recap bullet list
  const allActionable = allFindings.filter(f=>f.action==='Replace'||f.action==='Repair'||f.action==='Monitor');
  const recapLines = LOCS.filter(l=>allFindings.some(f=>f.loc===l.key)).map(l=>{
    const items = allFindings.filter(f=>f.loc===l.key).map(f=>`${f.area||'[area]'} (${f.action})`).join(', ');
    return `<div style="padding:3px 0">● <strong>${l.label}:</strong> ${items}</div>`;
  }).join('');

  return `
    <div style="page-break-before:always;padding:0">
      <div style="background:${G};padding:18px 36px 14px">
        <div style="font-size:10px;font-weight:700;color:${MG};letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">HOMEOWNER REVIEW</div>
        <div style="font-size:22px;font-weight:700;color:#fff">Property Condition Summary</div>
        <div style="font-size:12px;color:${MG};font-style:italic;margin-top:4px">${j.address||'[Address]'} &nbsp;·&nbsp; ${allFindings.length} finding${allFindings.length!==1?'s':''} across ${locGroups.length} location${locGroups.length!==1?'s':''}</div>
      </div>
      <div style="padding:20px 36px">
        ${locationSections}
      </div>
      <div style="background:${LG};border:2px solid ${G};margin:0 36px 20px;padding:14px 18px;border-radius:6px">
        <div style="font-size:13px;font-weight:700;color:${G};margin-bottom:8px">Walter Roofing — Summary of Findings</div>
        <div style="font-size:12px;color:#333;line-height:1.8">${recapLines}</div>
      </div>
      <div style="border-top:2px solid #ddd;padding:10px 36px;display:flex;justify-content:space-between;font-size:10px;color:#888">
        <span>Walter Roofing | Clive, IA | walterroofing.com</span>
        <span>Rep: ${j.repName||''} | ${j.inspDate||''}</span>
        <span>Property Condition Summary</span>
      </div>
    </div>`;
}

function genRetail(){
  const j=S.job;const{G,LG,MG,css}=rptBase();const tp=countPhotos();
  const RET='#5D4037';const RETL='#EFEBE9';
  const allFindings=[];
  ELEVS.forEach(e=>(S.elev[e].findings||[]).forEach(f=>allFindings.push({...f,loc:`${EL[e]} Elevation`})));
  (S.roof.findings||[]).forEach(f=>allFindings.push({...f,loc:'Roof'}));

  function actBadge(a){
    const map={Repair:`background:#FFF3CD;color:#856404;border:1px solid #d4a017`,Replace:`background:#FDECEA;color:#C0392B;border:1px solid #EF9A9A`,Monitor:`background:#EBF3FB;color:#2E75B6;border:1px solid #90CAF9`};
    return a?`<span style="${map[a]||''};border-radius:3px;padding:2px 8px;font-size:11px;font-weight:700;display:inline-block">${a}</span>`:'';
  }

  function findSec(f,i){
    return`<div style="border:1px solid #ddd;border-radius:6px;padding:12px;margin-bottom:10px;background:#fff">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:22px;height:22px;background:${G};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</div>
        <div style="font-size:13px;font-weight:700;color:${G};flex:1">${f.area||'[Surface/Area]'}</div>
        <div>${actBadge(f.action)}</div>
      </div>
      ${f.description?`<div style="font-size:12px;padding:8px 10px;background:#f9f9f9;border-radius:4px;border-left:3px solid ${MG};margin-bottom:8px"><strong>Observation:</strong> ${f.description}</div>`:''}
      ${f.crewNote?`<div style="font-size:12px;padding:8px 10px;background:#FFF3CD;border-radius:4px;border-left:3px solid #d4a017;margin-bottom:8px"><strong>Crew Note:</strong> ${f.crewNote}</div>`:''}
      ${f.material?`<div style="font-size:12px;padding:8px 10px;background:#EBF3FB;border-radius:4px;border-left:3px solid #90CAF9;margin-bottom:8px"><strong>Material / Product:</strong> ${f.material}</div>`:''}
      ${f.photos&&f.photos.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px">${f.photos.map((p,pi)=>`<div style="border:1px solid #ddd;border-radius:4px;overflow:hidden"><img src="${p.url}" style="width:100%;display:block;height:100px;object-fit:cover"><div style="font-size:10px;color:#888;padding:2px 4px;background:#f9f9f9;text-align:center">Photo ${pi+1}</div></div>`).join('')}</div>`:''}
    </div>`;
  }

  const elevSecs=ELEVS.map(e=>{
    const el=S.elev[e];const findings=el.findings||[];
    return`${shdr(`${EL[e]} Elevation`,ED[e],G)}
<div style="padding:12px 36px">
  ${pgRpt(el.ov,2,G,MG)}
  ${el.notes?`<div style="font-size:12px;color:#555;font-style:italic;padding:7px 10px;background:#f9f9f9;border-left:3px solid ${MG};margin:8px 0">${el.notes}</div>`:''}
  ${pgRpt(el.cu,2,G,MG)}
  ${findings.length?`<div style="font-size:11px;font-weight:700;color:${G};text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px">Findings — ${EL[e]} Elevation</div>${findings.map((f,i)=>findSec(f,i)).join('')}`:'<p style="font-size:12px;color:#888;font-style:italic;padding:6px 0">No findings recorded for this elevation.</p>'}
</div>`;
  }).join('');

  const scopeRows=allFindings.filter(f=>f.action==='Replace'||f.action==='Repair').map(f=>`<tr><td>${f.loc}</td><td>${f.area||'—'}</td><td>${actBadge(f.action)}</td><td style="font-size:11px">${f.material||'—'}</td><td style="font-size:11px">${f.crewNote||'—'}</td></tr>`).join('');
  const compRows=COMPS.filter(c=>S.roof.comps[c.id]).map(c=>`<tr><td>${c.l}</td><td style="text-align:center;font-weight:700">${S.roof.comps[c.id]}</td></tr>`).join('');

  const sumItems=[
    `${tp} total photos collected on ${j.inspDate||'[date]'} — upload to Claude.ai to add AI captions`,
    `${allFindings.length} total findings documented`,
    ...allFindings.filter(f=>f.action==='Replace').map(f=>`Replace: ${f.loc} — ${f.area||'[area]'}${f.material?' ('+f.material+')':''}`),
    ...allFindings.filter(f=>f.crewNote).map(f=>`Crew note — ${f.loc}: ${f.crewNote}`),
    'This report is a contractor inspection document prepared by Walter Roofing.',
  ].filter(Boolean);

  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Walter Roofing — Retail Inspection — ${j.owner||''}</title>
<style>${css}.ft{width:100%;border-collapse:collapse;margin:10px 0}.ft th{background:${RET};color:#fff;padding:7px 12px;text-align:left;font-size:11px}.ft td{padding:7px 12px;border:1px solid #ddd;font-size:12px;vertical-align:top}.ft tr:nth-child(even) td{background:${RETL}}</style>
</head><body><div class="page">
${rptHeader(j,G,LG,MG,'Retail Inspection Report',[['Total Photos',String(tp)],['Total Findings',String(allFindings.length)]])}
<div style="text-align:center;padding:16px 36px 12px;border-bottom:2px solid ${MG};margin-top:14px">
  <div style="font-size:22px;font-weight:700;color:${G}">RETAIL INSPECTION REPORT</div>
  <div style="font-size:11px;color:#888;font-style:italic;margin-top:4px">Property Condition Assessment &amp; Scope Document | Walter Roofing</div>
</div>
${scopeRows?`${phdr('1','SCOPE SUMMARY','All findings requiring repair or replacement',G,MG)}
<div style="padding:12px 36px">
  <table class="ft"><thead><tr><th>Location</th><th>Area / Surface</th><th>Action</th><th>Material</th><th>Crew Notes</th></tr></thead>
  <tbody>${scopeRows}</tbody></table>
</div>`:''}
${phdr(scopeRows?'2':'1','ELEVATIONS','Overview photos and detailed findings — Front · Right · Rear · Left',G,MG)}
${elevSecs}
${phdr(scopeRows?'3':'2','ROOF OVERVIEW & FINDINGS','Pitch · Components · Roof-specific findings',G,MG)}
${shdr('Roof System Overview','',G)}
<div style="padding:12px 36px">
  <div style="font-size:12px;margin-bottom:10px"><strong>Pitch:</strong> ${S.roof.pitch||'—'} &nbsp;&nbsp;<strong>Gutter Size:</strong> ${S.roof.gsize||'—'} &nbsp;&nbsp;<strong>Lineal Feet:</strong> ${S.roof.glf||'—'}</div>
  ${pgRpt(S.roof.ovPhotos,2,G,MG)}
</div>
${shdr('Roof Components','',G)}
<div style="padding:12px 36px">
  ${compRows?`<table style="margin-bottom:12px"><thead><tr><th>Component</th><th style="text-align:center;width:120px">Count</th></tr></thead><tbody>${compRows}</tbody></table>`:''}
  ${pgRpt(S.roof.accPhotos,3,G,MG)}
  ${(S.roof.findings||[]).length?`<div style="font-size:11px;font-weight:700;color:${G};text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px">Roof Findings</div>${S.roof.findings.map((f,i)=>findSec(f,i)).join('')}`:''}
  ${S.roof.notes?`<div style="font-size:12px;color:#555;font-style:italic;padding:7px 10px;background:#f9f9f9;border-left:3px solid ${MG};margin-top:8px">${S.roof.notes}</div>`:''}
</div>
<div class="sum"><h3>Summary — ${j.address||'[Address]'}</h3><ul>${sumItems.map(l=>`<li>${l}</li>`).join('')}</ul></div>
<div class="ftr"><span>Walter Roofing | Clive, IA | walterroofing.com</span><span>Rep: ${j.repName||''} | ${j.inspDate||''}</span><span>Retail Inspection Report</span></div>

${retailSummaryPage(j,allFindings,G,LG,MG,RET,RETL,actBadge,findSec)}

</div></body></html>`;
  dnld(html,`WR_Retail_${(j.address||'report').replace(/[^a-zA-Z0-9]/g,'_').substring(0,22)}_${j.inspDate||'draft'}.html`);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
showHome();
</script>
